version: "3.1"

nlu:
- intent: greet
  examples: |
    - hi
    - hello
    - hey
    - hey there
    - good morning
    - good evening

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you
    - see you later

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you human?
    - who are you?

- intent: explain_clause
  examples: |
    - explain this clause
    - what does this mean
    - simplify this agreement
    - break this down
    - explain in simple words
    - help me understand this clause
    - can you explain this

- intent: upload_document
  examples: |
    - I want to upload agreement
    - analyze my rent agreement
    - check my agreement

- intent: ask_risk
  examples: |
    - is this risky
    - any problem in this clause
    - is there any risk here

- intent: provide_clause
  examples: |
    - Tenant must pay ₹5000 penalty per day
    - landlord can evict anytime

- intent: greet
  examples: |
    - hi
    - hello
    - hey
    - hi there
    - good morning
    - good evening

- intent: goodbye
  examples: |
    - bye
